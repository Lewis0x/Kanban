base_url: https://your-jira-instance.example.com/
username: your-username
password: your-password
verify_ssl: false
request_timeout_seconds: 30
status_mapping:
  todo:
    - Open
    - To Do
    - Backlog
    - 已分配
  in_progress:
    - In Progress
    - Development
    - 开发中
  review:
    - In Review
    - Code Review
    - 审核中
  done:
    - Done
    - Resolved
    - Closed
    - 已关闭
    - 已解决
    - 测试中
    - 主干已解决
# Task Owner 自定义字段：填写 Jira REST 字段 id，如 customfield_12345，或纯数字 12345
# 仅在手动同步 Jira 时随 search 拉取；看板读缓存不额外请求 Jira
# task_owner_field: customfield_12345

role_settings:
  product_manager_roles:
    - humeng
    - 胡梦
  dev_manager_roles:
    - hushengquan
    - 胡圣泉
  developer_roles:
    - xieyi
    - 谢屹
  quality_roles:
    - humeng
    - 胡梦
filter_settings:
  allowed_filter_ids:
  default_filter_id: 
jql_filters:
  - project = ZWCAD
  - Sprint in openSprints() AND "Task Owner" in (chenxing, daijianlong, caixufeng, houbangqing, xieyifei, shimaoqing, zhangruiyan, xieyi, zhangjianfeng)
